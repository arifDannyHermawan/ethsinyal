<div id="app" style="max-width:480px;margin:0 auto;padding:10px 10px 28px"></div>

<script>
"use strict";

// ═══════════════════════════════════════════════════════════
// THEME COLORS
// ═══════════════════════════════════════════════════════════
var MONO     = "'SF Mono','Fira Code',SFMono-Regular,Consolas,monospace";
var MONO_SVG = "SF Mono,Fira Code,SFMono-Regular,Consolas,monospace";
var C = {
  bg:"#0a0e1a", bgDeep:"#0c1220", bgBuy:"#001f12", bgSell:"#200008", bgWait:"#201800",
  panel:"#0f1525", border:"#1e2a45",
  accent:"#00e5ff", buy:"#00ff88", sell:"#ff3366",
  wait:"#ffaa00", text:"#c8d8f0", muted:"#7090b8"
};

var LIMIT = 300; // 300 h1 candles needed for EMA200

// ═══════════════════════════════════════════════════════════
// DOM HELPERS
// ═══════════════════════════════════════════════════════════
function el(tag, opts, children) {
  var d = document.createElement(tag);
  opts = opts || {};
  // FIX: handle className separately from CSS style properties
  if (opts.className) { d.className = opts.className; }
  var styleObj = {};
  Object.keys(opts).forEach(function(k) {
    if (k === "className") return;
    styleObj[k] = opts[k];
  });
  Object.assign(d.style, styleObj);
  (children || []).forEach(function(c) {
    if (c == null) return;
    d.appendChild(typeof c === "string" ? document.createTextNode(c) : c);
  });
  return d;
}
function div(opts, children) { return el("div", opts, children); }
function span(opts, text) { return el("span", opts, [text]); }

function svgNS(tag, attrs) {
  var e = document.createElementNS("http://www.w3.org/2000/svg", tag);
  Object.keys(attrs).forEach(function(k) { e.setAttribute(k, attrs[k]); });
  return e;
}
function svgRoot(attrs, children) {
  var s = svgNS("svg", attrs);
  (children || []).forEach(function(c) { if (c) s.appendChild(c); });
  return s;
}

// ═══════════════════════════════════════════════════════════
// XHR — compatible with all browsers (no AbortSignal.timeout)
// ═══════════════════════════════════════════════════════════
function xhrGet(url, timeoutMs) {
  return new Promise(function(resolve, reject) {
    var xhr = new XMLHttpRequest();
    var settled = false;
    var timer = setTimeout(function() {
      if (!settled) { settled = true; xhr.abort(); reject(new Error("timeout")); }
    }, timeoutMs || 10000);

    xhr.onload = function() {
      if (settled) return; settled = true; clearTimeout(timer);
      if (xhr.status >= 200 && xhr.status < 300) {
        try { resolve(JSON.parse(xhr.responseText)); }
        catch(e) { reject(new Error("bad JSON")); }
      } else {
        reject(new Error("HTTP " + xhr.status));
      }
    };
    xhr.onerror  = function() { if (!settled) { settled=true; clearTimeout(timer); reject(new Error("network error")); }};
    xhr.onabort  = function() { if (!settled) { settled=true; clearTimeout(timer); reject(new Error("aborted")); }};
    xhr.open("GET", url, true);
    xhr.send();
  });
}

// ═══════════════════════════════════════════════════════════
// DATA SOURCES
// ═══════════════════════════════════════════════════════════
var SOURCES = [
  // ── 1. CryptoCompare — proper 1H OHLC, not an exchange ──
  {
    name: "CryptoCompare",
    fetch: function() {
      return xhrGet("https://min-api.cryptocompare.com/data/v2/histohour?fsym=ETH&tsym=USD&limit=" + LIMIT)
        .then(function(d) {
          if (!d.Data || !d.Data.Data) throw new Error("bad structure");
          return d.Data.Data.map(function(k) {
            return { t:new Date(+k.time*1000), o:+k.open, h:+k.high, l:+k.low, c:+k.close, v:+k.volumeto };
          });
        });
    }
  },
  // ── 2. CoinGecko — hourly prices, not an exchange ────────
  {
    name: "CoinGecko",
    fetch: function() {
      // market_chart with hourly interval gives ~300+ price points
      var days = Math.ceil(LIMIT / 24) + 1;
      return xhrGet("https://api.coingecko.com/api/v3/coins/ethereum/market_chart?vs_currency=usd&days=" + days + "&interval=hourly")
        .then(function(d) {
          if (!d.prices || !d.prices.length) throw new Error("no prices");
          var prices  = d.prices;
          var volumes = d.total_volumes || [];
          // Build pseudo-candles from consecutive hourly price points
          var candles = [];
          for (var i = 1; i < prices.length; i++) {
            var prev = prices[i-1], curr = prices[i];
            candles.push({
              t: new Date(+curr[0]),
              o: +prev[1],
              h: Math.max(+prev[1], +curr[1]),
              l: Math.min(+prev[1], +curr[1]),
              c: +curr[1],
              v: volumes[i] ? +volumes[i][1] : 0
            });
          }
          return candles.slice(-LIMIT);
        });
    }
  },
  // ── 3. Binance (exchange — may be blocked) ───────────────
  {
    name: "Binance",
    fetch: function() {
      return xhrGet("https://api.binance.com/api/v3/klines?symbol=ETHUSDT&interval=1h&limit=" + LIMIT)
        .then(function(d) {
          return d.map(function(k) {
            return { t:new Date(+k[0]), o:+k[1], h:+k[2], l:+k[3], c:+k[4], v:+k[5] };
          });
        });
    }
  },
  // ── 4. Kraken (exchange — may be blocked) ────────────────
  {
    name: "Kraken",
    fetch: function() {
      return xhrGet("https://api.kraken.com/0/public/OHLC?pair=ETHUSD&interval=60")
        .then(function(d) {
          var rows = null;
          var res = d.result || {};
          Object.keys(res).forEach(function(k) { if (Array.isArray(res[k])) rows = res[k]; });
          if (!rows || !rows.length) throw new Error("no rows");
          return rows.slice(-LIMIT).map(function(k) {
            return { t:new Date(+k[0]*1000), o:+k[1], h:+k[2], l:+k[3], c:+k[4], v:+k[6] };
          });
        });
    }
  },
  // ── 5. Coinbase (exchange — may be blocked) ──────────────
  {
    name: "Coinbase",
    fetch: function() {
      var end   = Math.floor(Date.now() / 1000);
      var start = end - LIMIT * 3600;
      return xhrGet("https://api.exchange.coinbase.com/products/ETH-USD/candles?granularity=3600&start=" + start + "&end=" + end)
        .then(function(d) {
          return d.slice().reverse().map(function(k) {
            return { t:new Date(+k[0]*1000), o:+k[3], h:+k[2], l:+k[1], c:+k[4], v:+k[5] };
          });
        });
    }
  },
  // ── 6. AllOrigins CORS proxy → Binance (last resort) ─────
  {
    name: "Proxy→Binance",
    fetch: function() {
      var target = encodeURIComponent("https://api.binance.com/api/v3/klines?symbol=ETHUSDT&interval=1h&limit=" + LIMIT);
      return xhrGet("https://api.allorigins.win/raw?url=" + target)
        .then(function(d) {
          return d.map(function(k) {
            return { t:new Date(+k[0]), o:+k[1], h:+k[2], l:+k[3], c:+k[4], v:+k[5] };
          });
        });
    }
  }
];

function fetchCandles() {
  var errors = [];
  function tryIdx(i) {
    if (i >= SOURCES.length) return Promise.reject(new Error("All sources failed: " + errors.join(" | ")));
    var src = SOURCES[i];
    return src.fetch()
      .then(function(candles) {
        if (!candles || candles.length < 50) throw new Error("data tidak cukup (" + (candles ? candles.length : 0) + ")");
        console.info("[ETH] OK:", src.name, candles.length, "candles");
        return { candles: candles, source: src.name };
      })
      .catch(function(e) {
        console.warn("[ETH]", src.name, "failed:", e.message);
        errors.push(src.name + ": " + e.message);
        return tryIdx(i + 1);
      });
  }
  return tryIdx(0);
}

// ═══════════════════════════════════════════════════════════
// INDICATOR CALCULATIONS
// ═══════════════════════════════════════════════════════════

// EMA — result[i] aligns with arr[period-1+i]
function calcEMA(arr, period) {
  if (arr.length < period) return [];
  var k = 2 / (period + 1);
  var sum = 0;
  for (var i = 0; i < period; i++) sum += arr[i];
  var ema = sum / period;
  var out = [ema];
  for (var j = period; j < arr.length; j++) {
    ema = arr[j] * k + ema * (1 - k);
    out.push(ema);
  }
  return out;
}

// RSI with Wilder smoothing — optimal period for H1 = 14
function calcRSI(closes, period) {
  period = period || 14;
  if (closes.length < period + 1) return [];
  var gains = [], losses = [];
  for (var i = 1; i < closes.length; i++) {
    var d = closes[i] - closes[i - 1];
    gains.push(d > 0 ? d : 0);
    losses.push(d < 0 ? -d : 0);
  }
  var ag = 0, al = 0;
  for (var j = 0; j < period; j++) { ag += gains[j]; al += losses[j]; }
  ag /= period; al /= period;
  var rsis = [];
  for (var k = period; k < gains.length; k++) {
    ag = (ag * (period - 1) + gains[k]) / period;
    al = (al * (period - 1) + losses[k]) / period;
    rsis.push(al === 0 ? 100 : 100 - 100 / (1 + ag / al));
  }
  return rsis;
}

// MACD (12, 26, 9) — standard optimal for all timeframes
function calcMACD(closes) {
  var ema12 = calcEMA(closes, 12); // starts at closes[11]
  var ema26 = calcEMA(closes, 26); // starts at closes[25]
  // Align: ema12[i+14] and ema26[i] both represent closes[25+i]
  var macdLine = [];
  for (var i = 0; i < ema26.length; i++) macdLine.push(ema12[i + 14] - ema26[i]);
  var signalLine = calcEMA(macdLine, 9);
  // histogram[j] = macdLine[j+8] - signalLine[j]
  var histogram = [];
  for (var j = 0; j < signalLine.length; j++) histogram.push(macdLine[j + 8] - signalLine[j]);
  return { macdLine: macdLine, signalLine: signalLine, histogram: histogram };
}

function last(arr) { return (arr && arr.length > 0) ? arr[arr.length - 1] : null; }
function prev(arr) { return (arr && arr.length > 1) ? arr[arr.length - 2] : null; }

// ── Signal Generation ─────────────────────────────────────
function calcSignal(candles) {
  var closes = candles.map(function(c) { return c.c; });
  var price = last(closes);

  var ema20arr  = calcEMA(closes, 20);
  var ema50arr  = calcEMA(closes, 50);
  var ema200arr = calcEMA(closes, 200);
  var ema20   = last(ema20arr);
  var ema50   = last(ema50arr);
  var ema200  = last(ema200arr);

  var rsiArr = calcRSI(closes, 14);
  var rsi    = last(rsiArr);

  var macdData  = calcMACD(closes);
  var macdVal   = last(macdData.macdLine);
  var sigVal    = last(macdData.signalLine);
  var histVal   = last(macdData.histogram);
  var prevHist  = prev(macdData.histogram);

  // ── Scoring: 7 conditions ─────────────────────────────
  var bull = 0, bear = 0;

  // EMA (3 pts)
  if (price > ema20)  bull++; else bear++;
  if (price > ema50)  bull++; else bear++;
  if (price > ema200) bull++; else bear++;

  // RSI (2 pts) — oversold/overbought worth double
  if      (rsi < 30) bull += 2;
  else if (rsi > 70) bear += 2;
  else if (rsi < 50) bull++;
  else               bear++;

  // MACD line vs signal line (1 pt)
  if (macdVal > sigVal) bull++; else bear++;

  // Histogram momentum: is it growing or shrinking? (1 pt)
  if (histVal > prevHist) bull++; else bear++;

  var signal = bull >= 5 ? "BUY" : bear >= 5 ? "SELL" : "WAIT";

  // ── Trend direction based on EMA alignment ────────────
  var trend;
  if      (ema20 > ema50 && ema50 > ema200) trend = { label:"UPTREND",      icon:"▲▲", color:C.buy,  desc:"EMA20 > EMA50 > EMA200" };
  else if (ema20 < ema50 && ema50 < ema200) trend = { label:"DOWNTREND",    icon:"▼▼", color:C.sell, desc:"EMA20 < EMA50 < EMA200" };
  else if (ema20 > ema50 && ema50 < ema200) trend = { label:"RECOVERY",     icon:"▲",  color:C.wait, desc:"EMA20 rising, still below EMA200" };
  else if (ema20 < ema50 && ema50 > ema200) trend = { label:"DISTRIBUTION", icon:"▼",  color:C.wait, desc:"EMA20 falling, still above EMA200" };
  else                                       trend = { label:"SIDEWAYS",     icon:"◆",  color:C.muted,desc:"EMA alignment unclear" };

  return {
    signal: signal, bull: bull, bear: bear, total: 7,
    price: price,
    ema20: ema20, ema50: ema50, ema200: ema200,
    _ema20arr: ema20arr, _ema50arr: ema50arr,
    rsi: rsi,
    macd: macdVal, macdSignal: sigVal,
    histogram: histVal, prevHistogram: prevHist,
    trend: trend
  };
}

// ═══════════════════════════════════════════════════════════
// CHART — SVG candlestick, last 60 candles
// ═══════════════════════════════════════════════════════════
function buildChart(allCandles, preEma20, preEma50) {
  var data   = allCandles.slice(-60);
  var closes = allCandles.map(function(c) { return c.c; });

  var W=450, H=185, PL=58, PR=8, PT=10, PB=24;
  var cW = W-PL-PR, cH = H-PT-PB;

  var highs = data.map(function(c){return c.h;});
  var lows  = data.map(function(c){return c.l;});
  var minP  = Math.min.apply(null, lows);
  var maxP  = Math.max.apply(null, highs);
  var pR    = maxP - minP || 1;
  var n     = data.length;
  var gap   = cW / n;
  var barW  = Math.max(2, gap - 1.5);

  function toX(i) { return PL + i*gap + gap/2; }
  function toY(p) { return PT + cH - ((p - minP) / pR) * cH; }
  function fmt(p) {
    // Use adaptive precision based on price range
    if (pR < 20)       return "$"+p.toFixed(1);
    if (pR < 200)      return "$"+Math.round(p);
    if (p >= 10000)    return "$"+(p/1000).toFixed(1)+"k";
    if (p >= 1000)     { var s=Math.round(p).toString(); var r=""; for(var _i=0;_i<s.length;_i++){if(_i>0&&(s.length-_i)%3===0)r+=",";r+=s[_i];} return "$"+r; }
    return "$"+p.toFixed(0);
  }
  function fmtT(d){ return d.getHours().toString().padStart(2,"0")+":"+d.getMinutes().toString().padStart(2,"0"); }

  var maxVol = Math.max.apply(null, data.map(function(c){return c.v;}));
  var gridPs = [0,1,2,3,4].map(function(i){return minP+(pR/4)*i;});
  var els    = [];

  // Grid lines + price labels
  gridPs.forEach(function(p, i) {
    els.push(svgNS("line",{x1:PL,y1:toY(p),x2:W-PR,y2:toY(p),stroke:C.border,"stroke-width":.5,"stroke-dasharray":"3,4"}));
    var t = svgNS("text",{x:PL-4,y:toY(p)+3,"text-anchor":"end",fill:C.muted,"font-size":8,"font-family":MONO_SVG});
    t.textContent = fmt(p);
    els.push(t);
  });

  // Use pre-calculated EMAs passed from calcSignal — no duplicate computation
  // Use pre-calculated EMAs (always passed from render pipeline)
  var ema20sl = (preEma20 || []).slice(-60);
  var ema50sl = (preEma50 || []).slice(-60);

  function emaPath(arr, color) {
    var d = "";
    arr.forEach(function(v, i) {
      var x = toX(i), y = toY(v);
      var inView = y >= PT && y <= PT+cH;
      if (!inView) {
        // FIX: don't just skip — move pen so line doesn't draw across gap
        d += ""; // effectively breaks path segment
      } else {
        // FIX: use M if previous point was out of view or this is first point
        var prevY = i > 0 ? toY(arr[i-1]) : null;
        var prevInView = prevY !== null && prevY >= PT && prevY <= PT+cH;
        d += (i === 0 || !prevInView ? "M" : "L") + x.toFixed(1) + "," + y.toFixed(1) + " ";
      }
    });
    if (!d.trim()) return null;
    return svgNS("path",{d:d.trim(),fill:"none",stroke:color,"stroke-width":1.2,opacity:.75});
  }

  var p20 = emaPath(ema20sl, C.accent);
  var p50 = emaPath(ema50sl, C.wait);
  if (p20) els.push(p20);
  if (p50) els.push(p50);

  // Volume bars (behind candles)
  data.forEach(function(c, i) {
    var vH = maxVol > 0 ? (c.v / maxVol) * 26 : 0;
    els.push(svgNS("rect",{
      x:toX(i)-barW/2, y:PT+cH-vH, width:barW, height:vH,
      fill: c.c >= c.o ? C.buy+"18" : C.sell+"18"
    }));
  });

  // Candlesticks
  data.forEach(function(c, i) {
    var bull  = c.c >= c.o;
    var color = bull ? C.buy : C.sell;
    var bTop  = toY(Math.max(c.o, c.c));
    var bBot  = toY(Math.min(c.o, c.c));
    var bH    = Math.max(1, bBot - bTop);
    var cx    = toX(i);
    var g     = document.createElementNS("http://www.w3.org/2000/svg","g");
    g.appendChild(svgNS("line",{x1:cx,y1:toY(c.h),x2:cx,y2:toY(c.l),stroke:color,"stroke-width":1,opacity:.85}));
    g.appendChild(svgNS("rect",{
      x:cx-barW/2, y:bTop, width:barW, height:bH,
      fill: bull ? color : "transparent",
      stroke: color, "stroke-width": bull ? 0 : 1, opacity:.9
    }));
    els.push(g);
  });

  // Latest price dashed line
  var latest   = data[data.length-1];
  var prev2    = data[data.length-2];
  var chColor  = latest.c >= prev2.c ? C.buy : C.sell;
  els.push(svgNS("line",{x1:PL,y1:toY(latest.c),x2:W-PR,y2:toY(latest.c),stroke:chColor,"stroke-width":.8,"stroke-dasharray":"4,3",opacity:.6}));

  // Time labels
  [0, 15, 30, 45, 59].forEach(function(i) {
    if (i >= data.length) return;
    var t = svgNS("text",{x:toX(i),y:H-5,"text-anchor":"middle",fill:C.muted,"font-size":8,"font-family":MONO_SVG});
    t.textContent = fmtT(data[i].t);
    els.push(t);
  });

  // EMA legend
  [["EMA20",C.accent,PL+2],["EMA50",C.wait,PL+44]].forEach(function(leg) {
    var t = svgNS("text",{x:leg[2],y:PT+10,fill:leg[1],"font-size":7,"font-family":MONO_SVG});
    t.textContent = leg[0];
    els.push(t);
  });

  var chart = svgRoot({width:"100%",height:H,viewBox:"0 0 "+W+" "+H,style:"display:block;max-width:100%;touch-action:pan-y",preserveAspectRatio:"xMidYMid meet"}, els);

  // Touch: find candle by x position
  var hoveredCandle = null;
  function showTooltip(clientX, svgEl) {
    var rect = svgEl.getBoundingClientRect();
    var relX = (clientX - rect.left) / rect.width * W;
    var idx = Math.floor((relX - PL) / gap);
    if (idx < 0) idx = 0;
    if (idx >= data.length) idx = data.length - 1;
    var c = data[idx];
    if (c === hoveredCandle) return;
    hoveredCandle = c;
    // Update tooltip div
    var tt = document.getElementById("chart-tooltip");
    if (!tt) return;
    var bull = c.c >= c.o;
    var col  = bull ? C.buy : C.sell;
    // Safe DOM manipulation — no innerHTML with dynamic data
    while (tt.firstChild) tt.removeChild(tt.firstChild);
    var timeSpan = document.createElement("span");
    timeSpan.style.cssText = "color:"+C.muted+";font-size:9px;margin-right:6px";
    timeSpan.textContent = c.t.getHours().toString().padStart(2,"0")+":"+c.t.getMinutes().toString().padStart(2,"0");
    tt.appendChild(timeSpan);
    [["O",fmt(c.o),col],["H",fmt(c.h),C.buy],["L",fmt(c.l),C.sell],["C",fmt(c.c),col]].forEach(function(item){
      var s = document.createElement("span");
      s.style.cssText = "color:"+item[2]+";margin-right:4px";
      s.textContent = item[0]+item[1];
      tt.appendChild(s);
    });
    tt.style.opacity = "1";
  }
  function hideTooltip() {
    hoveredCandle = null;
    var tt = document.getElementById("chart-tooltip");
    if (tt) tt.style.opacity = "0";
  }
  chart.addEventListener("mousemove",  function(e){ showTooltip(e.clientX, chart); });
  chart.addEventListener("mouseleave", function()  { hideTooltip(); });
  chart.addEventListener("touchstart", function(e){ e.preventDefault(); showTooltip(e.touches[0].clientX, chart); }, {passive:false});
  chart.addEventListener("touchmove",  function(e){ e.preventDefault(); showTooltip(e.touches[0].clientX, chart); }, {passive:false});
  chart.addEventListener("touchend",   function()  { setTimeout(hideTooltip, 1200); });
  return chart;
}

function fmtPrice(p) {
  var s = p.toFixed(2);
  var dec = s.slice(-3);
  var int = s.slice(0, -3);
  var out = "";
  for (var i = 0; i < int.length; i++) {
    if (i > 0 && (int.length - i) % 3 === 0) out += ",";
    out += int[i];
  }
  return "$" + out + dec;
}
function fmtSigned(n, dec) {
  if (n == null || isNaN(n)) return "—";
  return (n >= 0 ? "+" : "") + n.toFixed(dec || 2);
}

function buildChartCard(candles, source, updated, preEma20, preEma50) {

  var isOpen  = false; // default: minimized

  var card = div({background:C.panel,border:"1px solid "+C.border,borderRadius:12,marginBottom:12,className:"fadein",overflow:"hidden",boxShadow:"0 2px 16px rgba(0,0,0,.4)"});

  // ── Compact always-visible header row ─────────────────

    display:"flex",justifyContent:"space-between",alignItems:"center",
    padding:"9px 12px",cursor:"pointer",userSelect:"none",gap:"8px"
  });

  // Left: symbol + timeframe
  var leftGrp = div({display:"flex",alignItems:"center",gap:"6px",flexShrink:0});
  var dot = div({width:6,height:6,borderRadius:"50%",background:C.buy,boxShadow:"0 0 5px "+C.buy,className:"glow",flexShrink:0});
  leftGrp.appendChild(dot);
  leftGrp.appendChild(span({fontSize:12,fontWeight:700,color:"#fff",letterSpacing:.5},"ETH/USDT"));
  leftGrp.appendChild(span({fontSize:8,color:C.accent,border:"1px solid "+C.accent+"55",borderRadius:3,padding:"1px 4px",fontWeight:600},"1H"));
  hdr.appendChild(leftGrp);

  // Center: price + change on ONE line
  var midGrp = div({display:"flex",alignItems:"center",gap:"5px",flex:1,justifyContent:"center"});
  midGrp.appendChild(span({fontSize:15,fontWeight:700,color:"#fff",fontFamily:MONO,letterSpacing:-.3},fmtPrice(latest.c)));
  midGrp.appendChild(span({fontSize:10,fontWeight:600,color:chColor},(change>=0?"▲":"▼")+Math.abs(change).toFixed(2)+"%"));
  hdr.appendChild(midGrp);

  // Right: countdown + chevron
  var rightGrp = div({display:"flex",alignItems:"center",gap:"5px",flexShrink:0});
  var cntEl = span({fontSize:9,color:C.muted});
  cntEl.id = "refresh-status";
  rightGrp.appendChild(cntEl);
  var chevron = span({fontSize:10,color:C.muted,transition:"transform .25s",display:"inline-block",lineHeight:1},"▼");
  rightGrp.appendChild(chevron);
  hdr.appendChild(rightGrp);

  card.appendChild(hdr);

  // ── Collapsible chart body ─────────────────────────────
  var body = div({overflow:"hidden",maxHeight:"0px",transition:"max-height .3s ease",borderTop:"0px solid "+C.border});

  var chartWrap = div({position:"relative",padding:"0 6px 6px"});
  chartWrap.appendChild(buildChart(candles, preEma20, preEma50));
  var ttEl = div({
    position:"absolute", top:"4px", left:"64px",
    fontFamily:MONO, fontSize:9, color:C.text,
    background:C.panel+"ee", padding:"2px 7px", borderRadius:4,
    border:"1px solid "+C.border, pointerEvents:"none",
    opacity:0, transition:"opacity .15s", whiteSpace:"nowrap"
  });
  ttEl.id = "chart-tooltip";
  chartWrap.appendChild(ttEl);
  body.appendChild(chartWrap);

  var srcEl = div({fontSize:8,color:C.muted,textAlign:"right",padding:"0 8px 6px"},
    ["via "+source+" · "+updated.getHours().toString().padStart(2,"0")+":"+updated.getMinutes().toString().padStart(2,"0")]);
  body.appendChild(srcEl);
  card.appendChild(body);

  // ── Toggle logic ───────────────────────────────────────
  hdr.setAttribute("role","button");
  hdr.setAttribute("aria-expanded","false");
  hdr.setAttribute("aria-label","Toggle chart view");
  hdr.onclick = function() {
    isOpen = !isOpen;
    body.style.maxHeight  = isOpen ? "260px" : "0px";
    body.style.borderTopWidth = isOpen ? "1px" : "0px";
    chevron.textContent       = isOpen ? "▲" : "▼";
    chevron.style.color       = isOpen ? C.accent : C.muted;
    hdr.setAttribute("aria-expanded", isOpen ? "true" : "false");
  };

  return card;
}

function buildSignalCard(ind) {
  var sig   = ind.signal;
  var sc    = sig==="BUY" ? C.buy : sig==="SELL" ? C.sell : C.wait;
  var sanim = sig==="BUY" ? "pulse-buy" : sig==="SELL" ? "pulse-sell" : "pulse-wait";
  var icon  = sig==="BUY" ? "▲" : sig==="SELL" ? "▼" : "◆";
  var score = sig==="BUY" ? ind.bull : sig==="SELL" ? ind.bear : Math.max(ind.bull,ind.bear);
  var pct   = Math.round(score / ind.total * 100);
  // Dark bg tokens: C.buy/sell/wait at ~8% opacity on C.bg
  var bgDark = sig==="BUY" ? C.bgBuy : sig==="SELL" ? C.bgSell : C.bgWait;

  var card = div({
    background: "linear-gradient(160deg,"+bgDark+" 0%,#0c1220 100%)",
    border: "2px solid "+sc+"44",
    borderRadius: 14,
    padding: "18px 18px 14px",
    textAlign: "center",
    marginBottom: 10,
    position: "relative",
    overflow: "visible",
    boxShadow: "0 0 40px "+sc+"28, 0 4px 20px rgba(0,0,0,.6)"
  });
  card.setAttribute("role","status");
  card.setAttribute("aria-label","Trading signal: "+sig+" — "+score+" of "+ind.total+" indicators agree");
  // Separate pulse ring — doesn't conflict with card's box-shadow
  var ring = div({
    position:"absolute",top:-2,left:-2,right:-2,bottom:-2,
    borderRadius:16,border:"2px solid "+sc+"44",
    animation:sanim+" 2s infinite",pointerEvents:"none"
  });
  card.appendChild(ring);

  // Icon inline + Signal word on same line
  var sigRow = div({
    display:"flex", alignItems:"center", justifyContent:"center",
    gap:10, marginBottom:10
  });
  sigRow.appendChild(span({
    fontSize:36, color:sc, lineHeight:1,
    textShadow:"0 0 16px "+sc
  }, icon));
  sigRow.appendChild(span({
    fontSize:56, fontWeight:900, color:sc, letterSpacing:4,
    lineHeight:1, textShadow:"0 0 40px "+sc+", 0 0 12px "+sc+"bb"
  }, sig));
  card.appendChild(sigRow);

  // Score row: "5 / 7  ·  71%" bigger and more readable
  var scoreRow = div({
    display:"flex", alignItems:"center", justifyContent:"center", gap:8, marginBottom:10
  });
  scoreRow.appendChild(span({fontSize:15,fontWeight:700,color:sc,fontFamily:MONO}, score+"/"+ind.total));
  scoreRow.appendChild(span({fontSize:12,color:sc+"66"}, "·"));
  scoreRow.appendChild(span({fontSize:13,fontWeight:600,color:sc+"cc"}, pct+"%"));
  card.appendChild(scoreRow);

  // Strength bar
  var barTrack = div({
    height:4, background:"rgba(255,255,255,.08)",
    borderRadius:4, overflow:"hidden", position:"relative"
  });
  var barFill = div({
    position:"absolute", top:0, left:0, height:"100%",
    background:"linear-gradient(to right,"+sc+"77,"+sc+")",
    borderRadius:4, boxShadow:"0 0 8px "+sc, transition:"width .7s ease"
  });
  barFill.style.width = pct+"%";
  barTrack.appendChild(barFill);
  card.appendChild(barTrack);

  return card;
}

  });
  var rsiMark = div({

  rsiWrap.appendChild(div({display:"flex",justifyContent:"space-between",marginTop:4},[
    span({color:C.buy,fontSize:9},"30"),
    span({color:C.muted,fontSize:9},"50"),
    span({color:C.sell,fontSize:9},"70")
  ]));
  card.appendChild(rsiWrap);

  // ── MACD ─────────────────────────────────────────────
  card.appendChild(sectionLabel("MACD (12 · 26 · 9)"));
  var macdBull = ind.macd > ind.macdSignal;
  var histBull = ind.histogram > ind.prevHistogram;
  card.appendChild(indRow(
    "MACD / Signal",
    fmtSigned(ind.macd)+" / "+fmtSigned(ind.macdSignal),
    macdBull?"▲ BULLISH":"▼ BEARISH",
    macdBull?C.buy:C.sell
  ));
  card.appendChild(indRow(
    "Histogram",
    fmtSigned(ind.prevHistogram,2)+" → "+fmtSigned(ind.histogram,2),
    histBull?"▲ RISING":"▼ FALLING",
    histBull?C.buy:C.sell
  ));

  return card;
}

// NOTIFICATION SYSTEM
// ═══════════════════════════════════════════════════════════
var NOTIF_KEY = "eth_last_signal";

function getLastSignal() {
  try { return localStorage.getItem(NOTIF_KEY) || null; } catch(e) { return null; }
}
function saveLastSignal(sig) {
  try { localStorage.setItem(NOTIF_KEY, sig); } catch(e) {}
}

function requestNotifPermission(cb) {
  if (!("Notification" in window)) return;
  if (Notification.permission === "granted") { if (cb) cb(); return; }
  if (Notification.permission === "denied")  return;
  Notification.requestPermission().then(function(p) {
    if (p === "granted" && cb) cb();
  });
}

function sendNotif(sig, ind) {
  if (!("Notification" in window)) return;
  if (Notification.permission !== "granted") return;
  var icons = { BUY:"▲", SELL:"▼", WAIT:"◆" };
  var colors = { BUY:C.buy, SELL:C.sell, WAIT:C.wait };
  var bodies = {
    BUY:  "Signal strength "+Math.round((ind.bull/ind.total)*100)+"% · "+ind.trend.label+" · RSI "+ind.rsi.toFixed(1),
    SELL: "Signal strength "+Math.round((ind.bear/ind.total)*100)+"% · "+ind.trend.label+" · RSI "+ind.rsi.toFixed(1),
    WAIT: "Mixed signals · "+ind.trend.label+" · RSI "+ind.rsi.toFixed(1)
  };
  try {
    var n = new Notification("ETH/USDT — " + icons[sig] + " " + sig, {
      body: bodies[sig] || "",
      icon: "data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%230a0e1a'/><text y='68' x='50' text-anchor='middle' font-size='55' fill='"+encodeURIComponent(colors[sig] || C.accent)+"'>⬡</text></svg>",
      badge:"data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 96 96'><rect width='96' height='96' rx='18' fill='%230a0e1a'/><text y='68' x='48' text-anchor='middle' font-size='54' fill='%2300e5ff'>⬡</text></svg>",
      tag: "eth-signal",
      renotify: true,
      vibrate: [200, 100, 200]
    });
    n.onclick = function() { window.focus(); n.close(); };
    setTimeout(function() { n.close(); }, 8000);
  } catch(e) { console.warn("Notification error:", e); }
}

function checkSignalChange(ind) {
  var prev = getLastSignal();
  var curr = ind.signal;
  saveLastSignal(curr);
  if (prev && prev !== curr) {
    sendNotif(curr, ind);
    return true;
  }
  return false;
}

// Build small notification permission banner
function buildNotifBanner() {
  if (!("Notification" in window)) return null;
  if (Notification.permission === "granted") return null;
  if (Notification.permission === "denied")  return null;

  var banner = div({
    background: C.accent+"11", border:"1px solid "+C.accent+"44",
    borderRadius:10, padding:"8px 12px", marginBottom:8,
    display:"flex", alignItems:"center", justifyContent:"space-between",
    gap:"8px"
  });
  banner.appendChild(div({fontSize:10, color:C.accent, flex:1},
    ["🔔 Enable notifications to get alerted when signal changes."]));
  var btn = el("button", {
    background:C.accent, color:"#000", border:"none",
    borderRadius:6, padding:"4px 12px", fontSize:10,
    fontWeight:700, cursor:"pointer", flexShrink:0
  }, ["Enable"]);
  btn.onclick = function() {
    requestNotifPermission(function() {
      banner.style.display = "none";
    });
  };
  banner.appendChild(btn);
  return banner;
}

// ═══════════════════════════════════════════════════════════
// MAIN APP CONTROLLER
// ═══════════════════════════════════════════════════════════
var app             = document.getElementById("app");
var refreshTimer    = null;
var countdownTimer  = null;
var nextRefreshAt   = null;
var lastData        = null;

function render(state, data) {
  app.innerHTML = "";

  if (state === "loading") {
    app.appendChild(buildLoading());
    return;
  }
  if (state === "error") {
    app.appendChild(buildError(data, loadData));
    return;
  }

  // state === "ok" — signal FIRST for maximum visibility
  var notifBanner = buildNotifBanner();
  if (notifBanner) app.appendChild(notifBanner);
  app.appendChild(buildSignalCard(data.ind));
  app.appendChild(buildChartCard(data.candles, data.source, data.updated, data.ema20arr, data.ema50arr));
  app.appendChild(buildIndicatorCard(data.ind));
  app.appendChild(buildDisclaimer());
}

// ── Countdown ticker ─────────────────────────────────────
function startCountdown() {
  clearInterval(countdownTimer);
  nextRefreshAt = Date.now() + 60000;
  countdownTimer = setInterval(function() {
    var el = document.getElementById("refresh-status");
    if (!el) return;
    var secs = Math.max(0, Math.round((nextRefreshAt - Date.now()) / 1000));
    el.textContent = secs > 0 ? "Refresh " + secs + "s" : "Updating...";
    el.style.color  = secs <= 10 ? C.wait : C.muted;
  }, 1000);
}

function setUpdatingBadge(msg) {
  var el = document.getElementById("refresh-status");
  if (el) { el.textContent = msg || "Updating..."; el.style.color = C.wait; }
}

// ── Data loader ───────────────────────────────────────────
function loadData() {
  if (!lastData) {
    render("loading");
  } else {
    setUpdatingBadge("Updating...");
  }

  fetchCandles()
    .then(function(result) {
      var ind = calcSignal(result.candles);
      checkSignalChange(ind); // check & notify if changed
      lastData = { candles:result.candles, ind:ind, source:result.source, updated:new Date(), ema20arr:ind._ema20arr, ema50arr:ind._ema50arr };
      render("ok", lastData);
      startCountdown();
    })
    .catch(function(e) {
      if (!lastData) {
        render("error", e.message);
      } else {
        setUpdatingBadge("Failed — retrying...");
        setTimeout(startCountdown, 3000);
      }
    });
}

// Start — request notif permission after first successful load
loadData();
clearInterval(refreshTimer);
refreshTimer = setInterval(loadData, 60 * 1000);

// INSTALL PROMPT
// ═══════════════════════════════════════════════════════════
var deferred = null;
var toast    = document.getElementById("toast");

window.addEventListener("beforeinstallprompt", function(e) {
  e.preventDefault();
  deferred = e;
  toast.style.display = "block";
  toast.innerHTML = '📱 <strong style="color:#00e5ff">Install App</strong> — Tap to add to homescreen';
  toast.onclick = function() {
    deferred.prompt();
    deferred.userChoice.then(function() { toast.style.display="none"; deferred=null; });
  };
  setTimeout(function() { toast.style.display="none"; }, 7000);
});

window.addEventListener("appinstalled", function() {
  toast.style.display = "block";
  toast.innerHTML = "✅ App installed!";
  setTimeout(function() { toast.style.display="none"; }, 3000);
});
</script>
