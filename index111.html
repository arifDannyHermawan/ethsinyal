<body>
<div id="app" style="max-width:480px;margin:0 auto;padding:8px 10px 28px"></div>

<script>
"use strict";

// ═══════════════════════════════════════════════════════════
// THEME COLORS
// ═══════════════════════════════════════════════════════════
var SANS = "-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif";
var MONO = "'SF Mono','Fira Code',SFMono-Regular,Consolas,monospace";
var C = {
  bg:"#0a0e1a", panel:"#0f1525", border:"#1e2a45",
  accent:"#00e5ff", buy:"#00ff88", sell:"#ff3366",
  wait:"#ffaa00", text:"#c8d8f0", muted:"#7090b8"
};

var LIMIT = 300; // 300 h1 candles needed for EMA200

// ═══════════════════════════════════════════════════════════
// DOM HELPERS
// ═══════════════════════════════════════════════════════════
function el(tag, opts, children) {
  var d = document.createElement(tag);
  opts = opts || {};
  // FIX: handle className separately from CSS style properties
  if (opts.className) { d.className = opts.className; }
  var styleObj = {};
  Object.keys(opts).forEach(function(k) {
    if (k === "className") return;
    styleObj[k] = opts[k];
  });
  Object.assign(d.style, styleObj);
  (children || []).forEach(function(c) {
    if (c == null) return;
    d.appendChild(typeof c === "string" ? document.createTextNode(c) : c);
  });
  return d;
}
function div(opts, children) { return el("div", opts, children); }
function span(opts, text) { return el("span", opts, [text]); }

function svgNS(tag, attrs) {
  var e = document.createElementNS("http://www.w3.org/2000/svg", tag);
  Object.keys(attrs).forEach(function(k) { e.setAttribute(k, attrs[k]); });
  return e;
}
function svgRoot(attrs, children) {
  var s = svgNS("svg", attrs);
  (children || []).forEach(function(c) { if (c) s.appendChild(c); });
  return s;
}

// ═══════════════════════════════════════════════════════════
// XHR — compatible with all browsers (no AbortSignal.timeout)
// ═══════════════════════════════════════════════════════════
function xhrGet(url, timeoutMs) {
  return new Promise(function(resolve, reject) {
    var xhr = new XMLHttpRequest();
    var settled = false;
    var timer = setTimeout(function() {
      if (!settled) { settled = true; xhr.abort(); reject(new Error("timeout")); }
    }, timeoutMs || 10000);

    xhr.onload = function() {
      if (settled) return; settled = true; clearTimeout(timer);
      if (xhr.status >= 200 && xhr.status < 300) {
        try { resolve(JSON.parse(xhr.responseText)); }
        catch(e) { reject(new Error("bad JSON")); }
      } else {
        reject(new Error("HTTP " + xhr.status));
      }
    };
    xhr.onerror  = function() { if (!settled) { settled=true; clearTimeout(timer); reject(new Error("network error")); }};
    xhr.onabort  = function() { if (!settled) { settled=true; clearTimeout(timer); reject(new Error("aborted")); }};
    xhr.open("GET", url, true);
    xhr.send();
  });
}

// ═══════════════════════════════════════════════════════════
// DATA SOURCES
// ═══════════════════════════════════════════════════════════
var SOURCES = [
  {
    name: "Binance",
    fetch: function() {
      return xhrGet("https://api.binance.com/api/v3/klines?symbol=ETHUSDT&interval=1h&limit=" + LIMIT)
        .then(function(d) {
          return d.map(function(k) {
            return { t:new Date(+k[0]), o:+k[1], h:+k[2], l:+k[3], c:+k[4], v:+k[5] };
          });
        });
    }
  },
  {
    name: "Kraken",
    fetch: function() {
      return xhrGet("https://api.kraken.com/0/public/OHLC?pair=ETHUSD&interval=60")
        .then(function(d) {
          var rows = null;
          var res = d.result || {};
          Object.keys(res).forEach(function(k) { if (Array.isArray(res[k])) rows = res[k]; });
          if (!rows || !rows.length) throw new Error("no rows");
          return rows.slice(-LIMIT).map(function(k) {
            return { t:new Date(+k[0]*1000), o:+k[1], h:+k[2], l:+k[3], c:+k[4], v:+k[6] };
          });
        });
    }
  },
  {
    name: "Coinbase",
    fetch: function() {
      var end   = Math.floor(Date.now() / 1000);
      var start = end - LIMIT * 3600;
      return xhrGet("https://api.exchange.coinbase.com/products/ETH-USD/candles?granularity=3600&start=" + start + "&end=" + end)
        .then(function(d) {
          return d.slice().reverse().map(function(k) {
            return { t:new Date(+k[0]*1000), o:+k[3], h:+k[2], l:+k[1], c:+k[4], v:+k[5] };
          });
        });
    }
  },
  {
    name: "Proxy→Binance",
    fetch: function() {
      var target = encodeURIComponent("https://api.binance.com/api/v3/klines?symbol=ETHUSDT&interval=1h&limit=" + LIMIT);
      return xhrGet("https://api.allorigins.win/raw?url=" + target)
        .then(function(d) {
          return d.map(function(k) {
            return { t:new Date(+k[0]), o:+k[1], h:+k[2], l:+k[3], c:+k[4], v:+k[5] };
          });
        });
    }
  }
];

function fetchCandles() {
  var errors = [];
  function tryIdx(i) {
    if (i >= SOURCES.length) return Promise.reject(new Error("Semua sumber gagal: " + errors.join(" | ")));
    var src = SOURCES[i];
    return src.fetch()
      .then(function(candles) {
        if (!candles || candles.length < 50) throw new Error("data tidak cukup (" + (candles ? candles.length : 0) + ")");
        console.log("[ETH] OK from", src.name, "—", candles.length, "candles");
        return { candles: candles, source: src.name };
      })
      .catch(function(e) {
        console.warn("[ETH]", src.name, "failed:", e.message);
        errors.push(src.name + ": " + e.message);
        return tryIdx(i + 1);
      });
  }
  return tryIdx(0);
}

// ═══════════════════════════════════════════════════════════
// INDICATOR CALCULATIONS
// ═══════════════════════════════════════════════════════════

// EMA — result[i] aligns with arr[period-1+i]
function calcEMA(arr, period) {
  if (arr.length < period) return [];
  var k = 2 / (period + 1);
  var sum = 0;
  for (var i = 0; i < period; i++) sum += arr[i];
  var ema = sum / period;
  var out = [ema];
  for (var j = period; j < arr.length; j++) {
    ema = arr[j] * k + ema * (1 - k);
    out.push(ema);
  }
  return out;
}

// RSI with Wilder smoothing — optimal period for H1 = 14
function calcRSI(closes, period) {
  period = period || 14;
  if (closes.length < period + 1) return [];
  var gains = [], losses = [];
  for (var i = 1; i < closes.length; i++) {
    var d = closes[i] - closes[i - 1];
    gains.push(d > 0 ? d : 0);
    losses.push(d < 0 ? -d : 0);
  }
  var ag = 0, al = 0;
  for (var j = 0; j < period; j++) { ag += gains[j]; al += losses[j]; }
  ag /= period; al /= period;
  var rsis = [];
  for (var k = period; k < gains.length; k++) {
    ag = (ag * (period - 1) + gains[k]) / period;
    al = (al * (period - 1) + losses[k]) / period;
    rsis.push(al === 0 ? 100 : 100 - 100 / (1 + ag / al));
  }
  return rsis;
}

// MACD (12, 26, 9) — standard optimal for all timeframes
function calcMACD(closes) {
  var ema12 = calcEMA(closes, 12); // starts at closes[11]
  var ema26 = calcEMA(closes, 26); // starts at closes[25]
  // Align: ema12[i+14] and ema26[i] both represent closes[25+i]
  var macdLine = [];
  for (var i = 0; i < ema26.length; i++) macdLine.push(ema12[i + 14] - ema26[i]);
  var signalLine = calcEMA(macdLine, 9);
  // histogram[j] = macdLine[j+8] - signalLine[j]
  var histogram = [];
  for (var j = 0; j < signalLine.length; j++) histogram.push(macdLine[j + 8] - signalLine[j]);
  return { macdLine: macdLine, signalLine: signalLine, histogram: histogram };
}

function last(arr) { return arr[arr.length - 1]; }
function prev(arr) { return arr[arr.length - 2]; }

// ── Signal Generation ─────────────────────────────────────
function calcSignal(candles) {
  var closes = candles.map(function(c) { return c.c; });
  var price = last(closes);

  var ema20arr  = calcEMA(closes, 20);
  var ema50arr  = calcEMA(closes, 50);
  var ema200arr = calcEMA(closes, 200);
  var ema20   = last(ema20arr);
  var ema50   = last(ema50arr);
  var ema200  = last(ema200arr);

  var rsiArr = calcRSI(closes, 14);
  var rsi    = last(rsiArr);

  var macdData  = calcMACD(closes);
  var macdVal   = last(macdData.macdLine);
  var sigVal    = last(macdData.signalLine);
  var histVal   = last(macdData.histogram);
  var prevHist  = prev(macdData.histogram);

  // ── Scoring: 7 conditions ─────────────────────────────
  var bull = 0, bear = 0;

  // EMA (3 pts)
  if (price > ema20)  bull++; else bear++;
  if (price > ema50)  bull++; else bear++;
  if (price > ema200) bull++; else bear++;

  // RSI (2 pts) — oversold/overbought worth double
  if      (rsi < 30) bull += 2;
  else if (rsi > 70) bear += 2;
  else if (rsi < 50) bull++;
  else               bear++;

  // MACD line vs signal line (1 pt)
  if (macdVal > sigVal) bull++; else bear++;

  // Histogram momentum: is it growing or shrinking? (1 pt)
  if (histVal > prevHist) bull++; else bear++;

  var signal = bull >= 5 ? "BUY" : bear >= 5 ? "SELL" : "WAIT";

  // ── Trend direction based on EMA alignment ────────────
  var trend;
  if      (ema20 > ema50 && ema50 > ema200) trend = { label:"UPTREND",   icon:"▲▲", color:"#00ff88", desc:"EMA20 > EMA50 > EMA200" };
  else if (ema20 < ema50 && ema50 < ema200) trend = { label:"DOWNTREND", icon:"▼▼", color:"#ff3366", desc:"EMA20 < EMA50 < EMA200" };
  else if (ema20 > ema50 && ema50 < ema200) trend = { label:"RECOVERY",  icon:"▲",  color:"#ffaa00", desc:"EMA20 rising, still below EMA200" };
  else if (ema20 < ema50 && ema50 > ema200) trend = { label:"DISTRIBUTION",icon:"▼",  color:"#ffaa00", desc:"EMA20 falling, still above EMA200" };
  else                                       trend = { label:"SIDEWAYS",  icon:"◆",  color:"#4a6080", desc:"EMA alignment unclear" };

  return {
    signal: signal, bull: bull, bear: bear, total: 7,
    price: price,
    ema20: ema20, ema50: ema50, ema200: ema200,
    rsi: rsi,
    macd: macdVal, macdSignal: sigVal,
    histogram: histVal, prevHistogram: prevHist,
    trend: trend
  };
}

// ═══════════════════════════════════════════════════════════
// CHART — SVG candlestick, last 60 candles
// ═══════════════════════════════════════════════════════════
function buildChart(allCandles) {
  var data   = allCandles.slice(-60);
  var closes = allCandles.map(function(c) { return c.c; });

  var W=450, H=185, PL=58, PR=8, PT=10, PB=24;
  var cW = W-PL-PR, cH = H-PT-PB;

  var highs = data.map(function(c){return c.h;});
  var lows  = data.map(function(c){return c.l;});
  var minP  = Math.min.apply(null, lows);
  var maxP  = Math.max.apply(null, highs);
  var pR    = maxP - minP || 1;
  var n     = data.length;
  var gap   = cW / n;
  var barW  = Math.max(2, gap - 1.5);

  function toX(i) { return PL + i*gap + gap/2; }
  function toY(p) { return PT + cH - ((p - minP) / pR) * cH; }
  function fmt(p) { return p>=1000 ? "$"+(p/1000).toFixed(1)+"k" : "$"+p.toFixed(0); }
  function fmtT(d){ return ("0"+d.getHours()).slice(-2)+":00"; }

  var maxVol = Math.max.apply(null, data.map(function(c){return c.v;}));
  var gridPs = [0,1,2,3,4].map(function(i){return minP+(pR/4)*i;});
  var els    = [];

  // Grid lines + price labels
  gridPs.forEach(function(p, i) {
    els.push(svgNS("line",{x1:PL,y1:toY(p),x2:W-PR,y2:toY(p),stroke:C.border,"stroke-width":.5,"stroke-dasharray":"3,4"}));
    var t = svgNS("text",{x:PL-4,y:toY(p)+3,"text-anchor":"end",fill:C.muted,"font-size":8,"font-family":"monospace"});
    t.textContent = fmt(p);
    els.push(t);
  });

  // EMA lines — FIX: use moveto on gaps to avoid broken lines at viewport edges
  var ema20full = calcEMA(closes, 20);
  var ema50full = calcEMA(closes, 50);
  var ema20sl   = ema20full.slice(-60);
  var ema50sl   = ema50full.slice(-60);

  function emaPath(arr, color) {
    var d = "";
    arr.forEach(function(v, i) {
      var x = toX(i), y = toY(v);
      var inView = y >= PT && y <= PT+cH;
      if (!inView) {
        // FIX: don't just skip — move pen so line doesn't draw across gap
        d += ""; // effectively breaks path segment
      } else {
        // FIX: use M if previous point was out of view or this is first point
        var prevY = i > 0 ? toY(arr[i-1]) : null;
        var prevInView = prevY !== null && prevY >= PT && prevY <= PT+cH;
        d += (i === 0 || !prevInView ? "M" : "L") + x.toFixed(1) + "," + y.toFixed(1) + " ";
      }
    });
    if (!d.trim()) return null;
    return svgNS("path",{d:d.trim(),fill:"none",stroke:color,"stroke-width":1.2,opacity:.75});
  }

  var p20 = emaPath(ema20sl, C.accent);
  var p50 = emaPath(ema50sl, C.wait);
  if (p20) els.push(p20);
  if (p50) els.push(p50);

  // Volume bars (behind candles)
  data.forEach(function(c, i) {
    var vH = maxVol > 0 ? (c.v / maxVol) * 26 : 0;
    els.push(svgNS("rect",{
      x:toX(i)-barW/2, y:PT+cH-vH, width:barW, height:vH,
      fill: c.c >= c.o ? C.buy+"18" : C.sell+"18"
    }));
  });

  // Candlesticks
  data.forEach(function(c, i) {
    var bull  = c.c >= c.o;
    var color = bull ? C.buy : C.sell;
    var bTop  = toY(Math.max(c.o, c.c));
    var bBot  = toY(Math.min(c.o, c.c));
    var bH    = Math.max(1, bBot - bTop);
    var cx    = toX(i);
    var g     = document.createElementNS("http://www.w3.org/2000/svg","g");
    g.appendChild(svgNS("line",{x1:cx,y1:toY(c.h),x2:cx,y2:toY(c.l),stroke:color,"stroke-width":1,opacity:.85}));
    g.appendChild(svgNS("rect",{
      x:cx-barW/2, y:bTop, width:barW, height:bH,
      fill: bull ? color : "transparent",
      stroke: color, "stroke-width": bull ? 0 : 1, opacity:.9
    }));
    els.push(g);
  });

  // Latest price dashed line
  var latest   = data[data.length-1];
  var prev2    = data[data.length-2];
  var chColor  = latest.c >= prev2.c ? C.buy : C.sell;
  els.push(svgNS("line",{x1:PL,y1:toY(latest.c),x2:W-PR,y2:toY(latest.c),stroke:chColor,"stroke-width":.8,"stroke-dasharray":"4,3",opacity:.6}));

  // Time labels
  [0, 15, 30, 45, 59].forEach(function(i) {
    if (i >= data.length) return;
    var t = svgNS("text",{x:toX(i),y:H-5,"text-anchor":"middle",fill:C.muted,"font-size":8,"font-family":"monospace"});
    t.textContent = fmtT(data[i].t);
    els.push(t);
  });

  // EMA legend
  [["EMA20",C.accent,PL+2],["EMA50",C.wait,PL+44]].forEach(function(leg) {
    var t = svgNS("text",{x:leg[2],y:PT+10,fill:leg[1],"font-size":7,"font-family":"monospace"});
    t.textContent = leg[0];
    els.push(t);
  });

  var chart = svgRoot({width:"100%",height:H,viewBox:"0 0 "+W+" "+H,style:"display:block;max-width:100%;touch-action:pan-y",preserveAspectRatio:"xMidYMid meet"}, els);

  // Touch: find candle by x position
  var hoveredCandle = null;
  function showTooltip(clientX, svgEl) {
    var rect = svgEl.getBoundingClientRect();
    var relX = (clientX - rect.left) / rect.width * W;
    var idx = Math.floor((relX - PL) / gap);
    if (idx < 0) idx = 0;
    if (idx >= data.length) idx = data.length - 1;
    var c = data[idx];
    if (c === hoveredCandle) return;
    hoveredCandle = c;
    // Update tooltip div
    var tt = document.getElementById("chart-tooltip");
    if (!tt) return;
    var bull = c.c >= c.o;
    var col  = bull ? C.buy : C.sell;
    tt.innerHTML =
      "<span style='color:"+C.muted+";font-size:9px'>"+
        ("0"+c.t.getHours()).slice(-2)+":00"+
      "</span>&nbsp;&nbsp;"+
      "O<span style='color:"+col+"'>"+fmt(c.o)+"</span> "+
      "H<span style='color:"+C.buy+"'>"+fmt(c.h)+"</span> "+
      "L<span style='color:"+C.sell+"'>"+fmt(c.l)+"</span> "+
      "C<span style='color:"+col+"'>"+fmt(c.c)+"</span>";
    tt.style.opacity = "1";
  }
  function hideTooltip() {
    hoveredCandle = null;
    var tt = document.getElementById("chart-tooltip");
    if (tt) tt.style.opacity = "0";
  }
  chart.addEventListener("mousemove",  function(e){ showTooltip(e.clientX, chart); });
  chart.addEventListener("mouseleave", function()  { hideTooltip(); });
  chart.addEventListener("touchstart", function(e){ e.preventDefault(); showTooltip(e.touches[0].clientX, chart); }, {passive:false});
  chart.addEventListener("touchmove",  function(e){ e.preventDefault(); showTooltip(e.touches[0].clientX, chart); }, {passive:false});
  chart.addEventListener("touchend",   function()  { setTimeout(hideTooltip, 1200); });
  return chart;
}

function fmtPrice(p) {
  return "$" + p.toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2});
}
function fmtSigned(n, dec) {
  return (n >= 0 ? "+" : "") + n.toFixed(dec || 2);
}

function buildLoading() {
  return div({background:C.panel,border:"1px solid "+C.border,borderRadius:14,padding:"28px 20px",textAlign:"center",marginBottom:12},[
    div({color:C.accent,fontSize:11,letterSpacing:3,marginBottom:10,className:"glow"},["CALCULATING SIGNAL..."]),
    div({color:C.muted,fontSize:9,lineHeight:1.8,marginBottom:14},["Binance → Kraken → Coinbase → Proxy"]),
    div({width:32,height:32,border:"3px solid "+C.border,borderTop:"3px solid "+C.accent,borderRadius:"50%",className:"spin",margin:"0 auto"})
  ]);
}

function buildError(msg, onRetry) {
  var btn = el("button",{background:C.accent+"22",border:"1px solid "+C.accent,color:C.accent,padding:"8px 22px",borderRadius:8,cursor:"pointer",fontSize:11,fontFamily:"inherit",marginTop:12},["↻ Retry"]);
  btn.onclick = onRetry;
  return div({background:C.panel,border:"1px solid "+C.sell+"55",borderRadius:14,padding:"20px",textAlign:"center",marginBottom:12},[
    div({color:C.sell,fontSize:13,marginBottom:8},["⚠ Failed to load data"]),
    div({color:C.muted,fontSize:9,lineHeight:1.7},[msg || "All sources failed."]),
    btn
  ]);
}

function buildChartCard(candles, source, updated) {
  var latest  = candles[candles.length-1];
  var prev2   = candles[candles.length-2];
  var change  = ((latest.c - prev2.c) / prev2.c) * 100;
  var chColor = change >= 0 ? C.buy : C.sell;
  var isOpen  = false; // default: minimized

  var card = div({background:C.panel,border:"1px solid "+C.border,borderRadius:12,marginBottom:8,className:"fadein",overflow:"hidden"});

  // ── Compact always-visible header row ─────────────────
  var hdr = div({
    display:"flex",justifyContent:"space-between",alignItems:"center",
    padding:"9px 12px",cursor:"pointer",userSelect:"none",gap:"8px"
  });

  // Left: symbol + timeframe
  var leftGrp = div({display:"flex",alignItems:"center",gap:"6px",flexShrink:0});
  var dot = div({width:6,height:6,borderRadius:"50%",background:C.buy,boxShadow:"0 0 5px "+C.buy,className:"glow",flexShrink:0});
  leftGrp.appendChild(dot);
  leftGrp.appendChild(span({fontSize:12,fontWeight:700,color:"#fff",letterSpacing:.5},"ETH/USDT"));
  leftGrp.appendChild(span({fontSize:8,color:C.accent,border:"1px solid "+C.accent+"55",borderRadius:3,padding:"1px 4px",fontWeight:600},"1H"));
  hdr.appendChild(leftGrp);

  // Center: price + change on ONE line
  var midGrp = div({display:"flex",alignItems:"center",gap:"5px",flex:1,justifyContent:"center"});
  midGrp.appendChild(span({fontSize:15,fontWeight:700,color:"#fff",fontFamily:MONO,letterSpacing:-.3},fmtPrice(latest.c)));
  midGrp.appendChild(span({fontSize:10,fontWeight:600,color:chColor},(change>=0?"▲":"▼")+Math.abs(change).toFixed(2)+"%"));
  hdr.appendChild(midGrp);

  // Right: countdown + chevron
  var rightGrp = div({display:"flex",alignItems:"center",gap:"5px",flexShrink:0});
  var cntEl = span({fontSize:9,color:C.muted});
  cntEl.id = "refresh-status";
  rightGrp.appendChild(cntEl);
  var chevron = span({fontSize:10,color:C.muted,transition:"transform .25s",display:"inline-block",lineHeight:1},"▼");
  rightGrp.appendChild(chevron);
  hdr.appendChild(rightGrp);

  card.appendChild(hdr);

  // ── Collapsible chart body ─────────────────────────────
  var body = div({overflow:"hidden",maxHeight:"0px",transition:"max-height .3s ease",borderTop:"0px solid "+C.border});

  var chartWrap = div({position:"relative",padding:"0 6px 6px"});
  chartWrap.appendChild(buildChart(candles));
  var ttEl = div({
    position:"absolute", top:"4px", left:"64px",
    fontFamily:MONO, fontSize:9, color:C.text,
    background:C.panel+"ee", padding:"2px 7px", borderRadius:4,
    border:"1px solid "+C.border, pointerEvents:"none",
    opacity:0, transition:"opacity .15s", whiteSpace:"nowrap"
  });
  ttEl.id = "chart-tooltip";
  chartWrap.appendChild(ttEl);
  body.appendChild(chartWrap);

  var srcEl = div({fontSize:8,color:C.muted,textAlign:"right",padding:"0 8px 6px"},
    ["via "+source+" · "+updated.toLocaleTimeString("id-ID",{hour:"2-digit",minute:"2-digit"})]);
  body.appendChild(srcEl);
  card.appendChild(body);

  // ── Toggle logic ───────────────────────────────────────
  hdr.onclick = function() {
    isOpen = !isOpen;
    body.style.maxHeight  = isOpen ? "260px" : "0px";
    body.style.borderTopWidth = isOpen ? "1px" : "0px";
    chevron.style.transform   = isOpen ? "rotate(180deg)" : "rotate(0deg)";
  };

  return card;
}

function buildSignalCard(ind) {
  var sig    = ind.signal;
  var sc     = sig==="BUY" ? C.buy : sig==="SELL" ? C.sell : C.wait;
  var sanim  = sig==="BUY" ? "pulse-buy" : sig==="SELL" ? "pulse-sell" : "pulse-wait";
  var icon   = sig==="BUY" ? "▲" : sig==="SELL" ? "▼" : "◆";
  var score  = sig==="BUY" ? ind.bull : sig==="SELL" ? ind.bear : Math.max(ind.bull,ind.bear);
  var pct    = Math.round(score / ind.total * 100);

  var card = div({background:sc+"12",border:"2px solid "+sc,borderRadius:12,padding:"14px 14px",textAlign:"center",marginBottom:8,boxShadow:"0 4px 20px "+sc+"22",animation:sanim+" 2s infinite"});

  var sigRow = div({display:"flex",alignItems:"center",justifyContent:"center",gap:"10px"});
  sigRow.appendChild(span({fontSize:18,color:sc,lineHeight:1},icon));
  sigRow.appendChild(span({fontSize:30,fontWeight:700,color:sc,letterSpacing:2,textShadow:"0 0 20px "+sc+", 0 0 6px "+sc+"88"},sig));
  card.appendChild(sigRow);

  // Strength bar
  var barWrap = div({marginTop:10,padding:"0 4px"});
  barWrap.appendChild(div({display:"flex",justifyContent:"space-between",marginBottom:3},[
    span({fontSize:9,color:C.muted,letterSpacing:.5},"SIGNAL STRENGTH"),
    span({fontSize:10,fontWeight:700,color:sc},pct+"%")
  ]));
  var barTrack = div({height:5,background:C.border,borderRadius:3,overflow:"hidden",position:"relative"});
  var barFill  = div({position:"absolute",top:0,left:0,height:"100%",background:sc,borderRadius:3,boxShadow:"0 0 6px "+sc,transition:"width .5s ease"});
  barFill.style.width = pct+"%";
  barTrack.appendChild(barFill);
  barWrap.appendChild(barTrack);
  card.appendChild(barWrap);

  // ── Trend direction badge ─────────────────────────────
  var tr = ind.trend;
  var trendWrap = div({marginTop:10,paddingTop:10,borderTop:"1px solid "+C.border+"44",textAlign:"center"});
  var tBadge = div({display:"inline-flex",alignItems:"center",gap:"5px",padding:"3px 12px",borderRadius:"20px",background:tr.color+"18",border:"1px solid "+tr.color+"55",marginBottom:4});
  tBadge.appendChild(span({fontSize:10,color:tr.color},tr.icon));
  tBadge.appendChild(span({fontSize:10,fontWeight:700,color:tr.color},tr.label));
  trendWrap.appendChild(tBadge);
  trendWrap.appendChild(div({fontSize:9,color:C.muted,lineHeight:1.4},[tr.desc]));
  card.appendChild(trendWrap);

  return card;
}

function indRow(label, value, statusText, statusColor) {
  var row = div({display:"flex",justifyContent:"space-between",alignItems:"center",padding:"6px 0",borderBottom:"1px solid "+C.border+"33"});
  var lft = div({});
  lft.appendChild(div({fontSize:10,color:C.muted},[label]));
  lft.appendChild(div({fontSize:11,color:C.text,fontFamily:MONO,marginTop:1},[value]));
  row.appendChild(lft);
  row.appendChild(span({fontSize:11,fontWeight:700,color:statusColor,flexShrink:0,marginLeft:10},statusText));
  return row;
}

function sectionLabel(txt) {
  return div({
    fontSize:9, color:C.muted, letterSpacing:.5,
    textTransform:"uppercase", padding:"10px 0 4px",
    borderTop:"1px solid "+C.border+"55", marginTop:2
  },[txt]);
}

function buildIndicatorCard(ind) {
  var card = div({background:C.panel,border:"1px solid "+C.border,borderRadius:12,padding:"10px 14px",marginBottom:8,className:"fadein"});

  // ── EMA ──────────────────────────────────────────────
  card.appendChild(div({fontSize:9,color:C.muted,letterSpacing:.5,paddingBottom:4},["EMA (20 · 50 · 200)"]));
  [
    ["EMA 20",  ind.ema20,  ind.price > ind.ema20],
    ["EMA 50",  ind.ema50,  ind.price > ind.ema50],
    ["EMA 200", ind.ema200, ind.price > ind.ema200]
  ].forEach(function(r) {
    var bull = r[2];
    card.appendChild(indRow(r[0], fmtPrice(r[1]), bull?"▲ ABOVE":"▼ BELOW", bull?C.buy:C.sell));
  });

  // ── RSI ──────────────────────────────────────────────
  card.appendChild(sectionLabel("RSI (14)"));
  var rsi      = ind.rsi;
  var rsiColor = rsi<30?C.buy : rsi>70?C.sell : rsi<50?C.buy : C.sell;
  var rsiLabel = rsi<30?"OVERSOLD ▲" : rsi>70?"OVERBOUGHT ▼" : rsi<50?"BULLISH":"BEARISH";

  var rsiWrap = div({padding:"4px 0 6px",borderBottom:"1px solid "+C.border+"44"});
  rsiWrap.appendChild(div({display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6},[
    span({fontSize:13,fontWeight:700,color:C.text,fontFamily:MONO},rsi.toFixed(1)),
    span({fontSize:11,fontWeight:700,color:rsiColor},rsiLabel)
  ]));
  var rsiBar = div({height:5,borderRadius:3,overflow:"hidden",
    background:"linear-gradient(to right,"+C.buy+" 0%,"+C.buy+" 30%,"+C.wait+" 30%,"+C.wait+" 70%,"+C.sell+" 70%,"+C.sell+" 100%)",
    opacity:.4,position:"relative"});
  var rsiMark = div({position:"absolute",top:-1,left:rsi+"%",width:3,height:7,background:rsiColor,
    borderRadius:2,boxShadow:"0 0 5px "+rsiColor,marginLeft:"-1.5px"});
  rsiMark.style.opacity = "1";
  var rsiBarWrap = div({position:"relative",height:5,borderRadius:3,overflow:"visible"});
  rsiBarWrap.appendChild(rsiBar);
  rsiBarWrap.appendChild(rsiMark);
  rsiWrap.appendChild(rsiBarWrap);
  rsiWrap.appendChild(div({display:"flex",justifyContent:"space-between",marginTop:4},[
    span({color:C.buy,fontSize:9},"30"),
    span({color:C.muted,fontSize:9},"50"),
    span({color:C.sell,fontSize:9},"70")
  ]));
  card.appendChild(rsiWrap);

  // ── MACD ─────────────────────────────────────────────
  card.appendChild(sectionLabel("MACD  (12 · 26 · 9)"));
  var macdBull = ind.macd > ind.macdSignal;
  var histBull = ind.histogram > ind.prevHistogram;
  card.appendChild(indRow(
    "MACD / Signal",
    fmtSigned(ind.macd)+" / "+fmtSigned(ind.macdSignal),
    macdBull?"▲ BULLISH":"▼ BEARISH",
    macdBull?C.buy:C.sell
  ));
  card.appendChild(indRow(
    "Histogram",
    fmtSigned(ind.histogram,2)+" → "+fmtSigned(ind.prevHistogram,2),
    histBull?"▲ RISING":"▼ FALLING",
    histBull?C.buy:C.sell
  ));

  return card;
}

function buildDisclaimer() {
  return div({padding:"10px 4px",marginBottom:4},[
    el("p",{color:C.muted,fontSize:10,lineHeight:1.6,textAlign:"center"},["⚠ For educational purposes only. Always apply risk management before entry."])
  ]);
}

// ═══════════════════════════════════════════════════════════
// MAIN APP CONTROLLER
// ═══════════════════════════════════════════════════════════
var app         = document.getElementById("app");
var refreshTimer    = null;
var countdownTimer  = null;
var nextRefreshAt   = null;  // timestamp ms of next refresh
var lastData        = null;  // cached last successful data

function render(state, data) {
  app.innerHTML = "";

  if (state === "loading") {
    app.appendChild(buildLoading());
    return;
  }
  if (state === "error") {
    app.appendChild(buildError(data, loadData));
    return;
  }

  // state === "ok"
  app.appendChild(buildChartCard(data.candles, data.source, data.updated));
  app.appendChild(buildSignalCard(data.ind));
  app.appendChild(buildIndicatorCard(data.ind));
  app.appendChild(buildDisclaimer());
}

// ── Countdown ticker ─────────────────────────────────────
function startCountdown() {
  clearInterval(countdownTimer);
  nextRefreshAt = Date.now() + 60000;
  countdownTimer = setInterval(function() {
    var el = document.getElementById("refresh-status");
    if (!el) return;
    var secs = Math.max(0, Math.round((nextRefreshAt - Date.now()) / 1000));
    el.textContent = secs > 0 ? "Refresh " + secs + "s" : "Updating...";
    el.style.color  = secs <= 10 ? C.wait : C.muted;
  }, 1000);
}

function setUpdatingBadge(msg) {
  var el = document.getElementById("refresh-status");
  if (el) { el.textContent = msg || "Updating..."; el.style.color = C.wait; }
}

// ── Data loader ───────────────────────────────────────────
function loadData() {
  if (!lastData) {
    // First load — show full loading screen
    render("loading");
  } else {
    // Background refresh — keep existing UI, just show badge
    setUpdatingBadge("Updating...");
  }

  fetchCandles()
    .then(function(result) {
      var ind = calcSignal(result.candles);
      lastData = { candles:result.candles, ind:ind, source:result.source, updated:new Date() };
      render("ok", lastData);
      startCountdown();
    })
    .catch(function(e) {
      if (!lastData) {
        render("error", e.message);
      } else {
        // Keep old data, just update badge with error hint
        setUpdatingBadge("Gagal — coba lagi...");
        setTimeout(startCountdown, 3000);
      }
    });
}

// Start
loadData();
clearInterval(refreshTimer);
refreshTimer = setInterval(loadData, 60 * 1000);

// INSTALL PROMPT
// ═══════════════════════════════════════════════════════════
var deferred = null;
var toast    = document.getElementById("toast");

window.addEventListener("beforeinstallprompt", function(e) {
  e.preventDefault();
  deferred = e;
  toast.style.display = "block";
  toast.innerHTML = '📱 <strong style="color:#00e5ff">Install App</strong> — Tap untuk pasang di homescreen';
  toast.onclick = function() {
    deferred.prompt();
    deferred.userChoice.then(function() { toast.style.display="none"; deferred=null; });
  };
  setTimeout(function() { toast.style.display="none"; }, 7000);
});

window.addEventListener("appinstalled", function() {
  toast.style.display = "block";
  toast.innerHTML = "✅ Berhasil diinstall!";
  setTimeout(function() { toast.style.display="none"; }, 3000);
});
</script>
